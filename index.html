<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Portfolio Demo</title>

<link rel="stylesheet" href="style.css">

<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}

.container{
  background:white;
  padding:40px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
  width:300px;
}

h2{
  margin:0;
}

p{
  margin-top:10px;
  font-size:14px;
  color:#555;
}

input{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:1px solid #ccc;
  border-radius:5px;
  box-sizing:border-box;
}

button{
  margin-top:15px;
  width:100%;
  padding:10px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}

button:hover{
  background:#0056b3;
}
</style>

</head>
<body>

<div class="container">

<h2>CRM Portfolio Demo</h2>
<p>Enter your email to access the CRM dashboard</p>

<form id="leadForm" action="https://formspree.io/f/xaqdgorb" method="POST">

<input type="email" name="email" placeholder="Enter your email" required>

<button type="submit">Enter CRM</button>

</form>

</div>

<form id="leadForm">
  <input type="email" name="email" placeholder="Enter your email" required>
  <button type="submit">Enter CRM</button>
</form>

<script>
const form = document.getElementById("leadForm");

form.addEventListener("submit", async function(event) {
  event.preventDefault(); // stop default refresh

  const email = form.email.value;

  // send email via fetch
  await fetch("https://formspree.io/f/xaqdgorb", {
    method: "POST",
    body: JSON.stringify({ email }),
    headers: { 'Content-Type': 'application/json', 'Accept':'application/json' }
  });

  // redirect manually
  window.location.href = "dashboard.html";
});
</script>

</body>
</html>
