<!DOCTYPE html>
<html>
<head>

<title>Samking CRM Portfolio</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="gate">

<h1>Welcome to My CRM Portfolio</h1>

<p>Enter your email to access the CRM demo</p>

<form id="leadForm" action="https://formspree.io/f/xaqdgorb" method="POST">

<input type="email" name="email" placeholder="Enter your email" required>

 <input type="name" name="Name" placeholder="Enter your Name" required>

<button type="submit">Access CRM</button>

</form>

 <script>
const form = document.getElementById("leadForm");

form.addEventListener("submit", async function(event) {
  event.preventDefault();

  const data = new FormData(form);

  await fetch(form.action, {
    method: "POST",
    body: data,
    headers: {
      'Accept': 'application/json'
    }
  });

  window.location.href = "dashboard.html";
});
 </script>
