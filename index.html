<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CRM Portfolio Demo</title>
<style>
body{
  font-family: Arial, sans-serif;
  background:#f4f6f9;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  margin:0;
}
.container{
  background:white;
  padding:40px;
  border-radius:10px;
  box-shadow:0 5px 15px rgba(0,0,0,0.1);
  text-align:center;
  width:320px;
}
h2{margin:0;}
p{margin-top:10px;font-size:14px;color:#555;}
input{
  width:100%;
  padding:10px;
  margin-top:15px;
  border:1px solid #ccc;
  border-radius:5px;
  box-sizing:border-box;
}
button{
  margin-top:15px;
  width:100%;
  padding:10px;
  background:#007bff;
  color:white;
  border:none;
  border-radius:5px;
  cursor:pointer;
}
button:hover{background:#0056b3;}
</style>
</head>
<body>

<div class="container" id="formContainer" style="display:none;">
  <h1>Welcome to my CRM Portfolio Demo</h1>
  <h2>My CRM Portfolio Demo</h2>
  <p>Enter your name and email to access the CRM dashboard</p>
  <form id="leadForm">
    <input type="text" name="name" placeholder="Enter your name" required>
    <input type="email" name="email" placeholder="Enter your email" required>
    <button type="submit">Enter CRM</button>
  </form>
</div>

<script>
// Redirect immediately if already submitted
if(localStorage.getItem("submitted") === "true"){
  window.location.href = "dashboard.html";
} else {
  // Show form if not submitted
  document.getElementById("formContainer").style.display = "block";
}

const form = document.getElementById("leadForm");
form.addEventListener("submit", async function(event){
  event.preventDefault();

  const name = form.name.value;
  const email = form.email.value;

  // Send email & name to Formspree
  await fetch("https://formspree.io/f/xaqdgorb", {
    method:"POST",
    body: JSON.stringify({name, email}),
    headers:{'Content-Type':'application/json','Accept':'application/json'}
  });

  // Mark as submitted
  localStorage.setItem("submitted","true");

  // Redirect to dashboard
  window.location.href = "dashboard.html";
});
</script>

</body>
</html>
